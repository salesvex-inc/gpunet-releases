name: release-desktop

# Builds the GPUNet Node desktop app (Tauri v2) from the private source repo,
# signs the updater bundles with minisign, and publishes a GitHub Release in
# THIS repo containing the installers + latest.json updater manifest.
#
# Trigger by pushing a `desktop-vX.Y.Z` tag, or manually via workflow_dispatch
# with the version input (a tag is created for you).

on:
  push:
    tags: ["desktop-v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. 0.2.0 (no leading v)"
        required: true
      prerelease:
        description: "Mark as a beta/pre-release"
        type: boolean
        default: false

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  # Private source repo that holds node-gui (the Tauri app).
  SRC_REPO: salesvex-inc/storiplus-gpu-net
  # Active dev branch; switch to `main` once it is promoted to production.
  SRC_REF: feat/gpunet-real-inference

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ver="${{ inputs.version }}"
          else
            ver="${GITHUB_REF_NAME#desktop-v}"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "tag=desktop-v$ver" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout release repo (for workflow + assets)
        uses: actions/checkout@v4

      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SRC_REPO }}
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.GPUNET_SRC_TOKEN }}
          path: src
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/node-gui/src-tauri

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        working-directory: src/node-gui
        run: npm install

      - name: Build, sign & publish (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: src/node-gui
          tagName: ${{ needs.resolve.outputs.tag }}
          releaseName: "GPUNet Node v${{ needs.resolve.outputs.version }}"
          releaseBody: "See the assets to download and install. Auto-update manifest: latest.json."
          releaseDraft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          includeUpdaterJson: true
          args: ${{ matrix.args }}

  record:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Update versions.json (desktop)
        shell: bash
        run: |
          node scripts/update-version.mjs desktop "${{ needs.resolve.outputs.version }}"
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git diff --cached --quiet || git commit -m "chore: record desktop v${{ needs.resolve.outputs.version }}"
          git push
