name: release-node

# Builds the gpunet node CLI / daemon (Rust) from the private source repo and
# publishes per-platform binaries as a GitHub Release in THIS repo.
#
# Trigger by pushing a `node-vX.Y.Z` tag, or manually via workflow_dispatch.

on:
  push:
    tags: ["node-v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. 0.2.0 (no leading v)"
        required: true

concurrency:
  group: release-node-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  SRC_REPO: salesvex-inc/storiplus-gpu-net
  # Active dev branch; switch to `main` once it is promoted to production.
  SRC_REF: feat/gpunet-real-inference

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - id: v
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ver="${{ inputs.version }}"
          else
            ver="${GITHUB_REF_NAME#node-v}"
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "tag=node-v$ver" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ""
          - platform: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - platform: macos-latest
            target: x86_64-apple-darwin
            ext: ""
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SRC_REPO }}
          ref: ${{ env.SRC_REF }}
          token: ${{ secrets.GPUNET_SRC_TOKEN }}
          submodules: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: node-client

      - name: Build gpunet CLI
        working-directory: node-client
        run: cargo build --release --bin gpunet --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          bin="node-client/target/${{ matrix.target }}/release/gpunet${{ matrix.ext }}"
          out="gpunet-${{ matrix.target }}${{ matrix.ext }}"
          cp "$bin" "$out"
          sha256sum "$out" > "$out.sha256" 2>/dev/null || shasum -a 256 "$out" > "$out.sha256"

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: "gpunet CLI v${{ needs.resolve.outputs.version }}"
          body: "Node CLI / daemon binaries. Verify with the accompanying .sha256 files."
          files: |
            gpunet-${{ matrix.target }}${{ matrix.ext }}
            gpunet-${{ matrix.target }}${{ matrix.ext }}.sha256

  record:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/update-version.mjs node "${{ needs.resolve.outputs.version }}"
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git diff --cached --quiet || git commit -m "chore: record node v${{ needs.resolve.outputs.version }}"
          git push
